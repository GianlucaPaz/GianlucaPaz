name: Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate languages metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: gianlucapaz
          filename: metrics.languages.svg
          base: ""

          plugin_languages: yes
          plugin_languages_sections: most-used,recently-used
          plugin_languages_indepth: yes
          plugin_languages_indepth_custom: |
            J4g3rWulf/automatic-happiness

          plugin_languages_categories: programming
          plugin_languages_recent_categories: programming
          plugin_languages_details: lines,bytes-size,percentage
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
          plugin_languages_recent_load: 400
          plugin_languages_recent_days: 30

          commits_authoring: |
            Gianluca Paz
            Gianluca do Nascimento Paz
            gianlucapaz
            gianlucapaz@gmail.com
            gianlucapaz@users.noreply.github.com

          plugin_languages_ignored: |
            html
            css
            tex
            less
            dockerfile
            makefile
            cmake
            shell
            gnuplot
