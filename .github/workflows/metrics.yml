name: Metrics

concurrency:
  group: metrics-main
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/metrics.yml"
      - ".github/scripts/build_languages_svg.py"

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate source JSON with Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: gianlucapaz
          filename: metrics.languages.json
          config_output: json
          output_action: none
          base: ""

          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_indepth_custom: |
            J4g3rWulf/automatic-happiness

          plugin_languages_categories: programming
          plugin_languages_details: lines,bytes-size,percentage
          plugin_languages_limit: 4
          plugin_languages_analysis_timeout: 15

          commits_authoring: |
            Gianluca Paz
            Gianluca do Nascimento Paz
            gianlucapaz
            gianlucapaz@gmail.com
            gianlucapaz@users.noreply.github.com

          plugin_languages_ignored: |
            html
            css
            tex
            less
            dockerfile
            makefile
            cmake
            shell
            gnuplot

      - name: Copy metrics JSON into repository
        run: cp /metrics_renders/metrics.languages.json ./metrics.languages.json

      - name: Build custom SVG card
        run: python .github/scripts/build_languages_svg.py

      - name: Commit generated SVG files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A assets/languages-custom.svg

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update custom language SVG"

          git pull --rebase origin main
          git push origin main
